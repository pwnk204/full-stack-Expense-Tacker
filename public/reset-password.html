<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password - ExpenseTracker</title>
    <link rel="stylesheet" href="./css/reset-password.css">
</head>

<body>
    <main class="auth-container">
        <div class="auth-card">
            <h2>Create New Password</h2>

            <div id="status-message" style="display: none; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
            </div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" required minlength="6"
                        placeholder="At least 6 characters">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required
                        placeholder="Type it again">
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary">Update Password</button>
            </form>
            <div id="error-actions" style="display: none; text-align: center; margin-top: 20px;">
                <a href="login.html" class="btn btn-primary" style="text-decoration: none;">Back to Login</a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type = "module" src="./js/reset-password.js"></script>
</body>

</html>
