<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Expense Tracker | login </title>
    <link rel="stylesheet" href="./css/login.css">

</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <h2>Login into your account</h2>
            <p>Enter your information below to login to your account</p>
            <form action="" id="login-form">

                <div class="form-field">
                    <label for="userEmail">Email</label>
                    <input type="email" id="userEmail" name="userEmail" placeholder="Enter your email address here"
                        required>
                </div>

                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="" required>
                    <a href="">Forgot your password</a>
                </div>


                <button type="submit" class="btn-primary login-btn">Login</button>
            </form>
            <div class="login-footer">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
