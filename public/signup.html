<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Expense Tracker | signup </title>
    <link rel="stylesheet" href="./css/auth.css">

</head>

<body>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create an Account</h2>
            <form action="" id="signp-form">
                <div class="form-field">
                    <label for="userName">Full Name</label>
                    <input type="text" id="userName" name="userName" placeholder="Enter your name here" required>
                </div>
                <div class="form-field">
                    <label for="userEmail">Email Address</label>
                    <input type="email" id="userEmail" name="userEmail" placeholder="Enter your email address here"
                        required>
                </div>

                <div class="form-field">
                    <label for="userPhone">Phone Number</label>
                    <input type="tel" id="userPhone" name="userPhone" placeholder="1234567890" pattern="[0-9]{10}"
                        required>
                </div>
                <div class="form-field">
                    <label for=""></label>
                    <input type="text">
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a strong password"
                        required>
                </div>
                <div class="form-field">
                    <label>Gender</label>
                    <div class="radio-grp">
                        <label><input type="radio" name="gender" value="male" required> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
