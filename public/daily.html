<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tracker | Expense Tracker</title>
    <link rel="stylesheet" href="./css/daily.css">
</head>

<body>
    <header class="header">
        <div class="header-left">
            <div class="brand">ExpenseTracker</div>
        </div>

        <nav class="nav-links">
            <a href="daily.html" class="nav-btn active">Daily</a>
            <a href="monthly.html" class="nav-btn">Monthly</a>
            <a href="yearly.html" class="nav-btn">Yearly</a>
            <button type="button" id="btn-premium" class="btn-premium">
                Premium
            </button>
            <button type="button" id="btn-leaderboard" class="nav-btn hidden">
                🏆 Leaderboard
            </button>
        </nav>

        <div class="header-right">
            <a href="profile.html" class="nav-btn profile-btn">Profile</a>
        </div>
    </header>

    <main class="daily-container">
        <div class="limit-selector" style="margin-bottom: 16px; text-align: center;">
            <label for="rows-per-page" style="color: #666; font-size: 0.9rem;">Rows per page:</label>
            <select id="rows-per-page" style="padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="3">3</option>
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
        <section class="summary-header">
            <div class="date-display date-selector">
                <button id="btn-prev-date" type="button" class="date-arrow">&lt;</button>
                <div class="current-date date-display-info">
                    <span id="display-day" class="day">16</span>
                    <div class="month-year date-details">
                        <span id="display-month-year">May, 2026</span>
                        <span id="display-weekday">Saturday</span>
                    </div>
                </div>
                <button id="btn-next-date" type="button" class="date-arrow">&gt;</button>
            </div>

            <div class="balance-display">
                <small>Balance</small>
                <h3>$392.00</h3>
            </div>

            <button type="button" id="add-entry-btn" class="btn-create">
                <span class="plus-icon">+</span> Create
            </button>
        </section>

        <section class="transaction-card">
            <div class="cf-row">
                <span>C/F</span>
                <span class="cf-amount"></span>
            </div>

            <div class="transaction-section credit-section">
                <div class="section-header credit-header">
                    <h4>Income (Credit)</h4>
                    <h4>$500.00</h4>
                </div>
                <ul class="transaction-list">

                </ul>
            </div>

            <div class="transaction-section debit-section">
                <div class="section-header debit-header">
                    <h4>Expense (Debit)</h4>
                    <h4>$64.00</h4>
                </div>
                <ul class="transaction-list">

                </ul>
            </div>
        </section>
    </main>

    <div id="expenseModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Record</h2>
                <button type="button" id="closeModalBtn" class="close-btn">&times;</button>
            </div>

            <form id="createExpenseForm">
                <div class="form-group toggle-group">
                    <label>
                        <input type="radio" name="transactionType" value="debit" checked> Expense
                    </label>
                    <label>
                        <input type="radio" name="transactionType" value="credit"> Income
                    </label>
                </div>

                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" name="amount" step="0.01" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required>
                </div>


                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" placeholder="e.g., Weekly groceries"
                        required>
                </div>

                <div class="modal-actions">
                    <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save Record</button>
                </div>
            </form>
        </div>
    </div>

    <div id="leaderboardModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" id="closeLeaderboardBtn">&times;</span>
            <h2>Premium Leaderboard</h2>
            <ul id="leaderboard-list" class="transaction-list">
                <!-- Data will be injected here -->
            </ul>
        </div>
    </div>


    <div id="pagination-container" class="pagination-wrapper">
        <button type="button" id="btn-prev-batch" class='page-btn'>&lt;</button>

        <div id="btn-container"></div>

        <button type="button" id="btn-next-batch" class='page-btn'>&gt;</button>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <script type="module" src="./js/daily.js"></script>
</body>

</html>
