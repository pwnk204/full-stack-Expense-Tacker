<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ExpenseTracker</title>
    <link rel="stylesheet" href="./css/reset-password.css"> 
</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
            <h2>Reset Your Password</h2>
            <p>Enter your email address and we will send you a link to reset your password.</p>

            <div id="status-message" style="display: none; padding: 10px; margin-bottom: 15px; border-radius: 4px;"></div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your registered email">
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary">Send Reset Link</button>
            </form>

            <div class="auth-links">
                <a href="login.html">Wait, I remember my password!</a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./js/forgot-password.js"></script>
</body>
</html>
